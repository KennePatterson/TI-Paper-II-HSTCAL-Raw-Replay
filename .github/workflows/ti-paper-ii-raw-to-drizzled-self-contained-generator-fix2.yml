name: TI Paper II Raw-to-Drizzled Self-Contained Generator Fix2

on:
  workflow_dispatch:
    inputs:
      hlsp_reference_url:
        description: "Verified public HLSP drizzled SCI FITS reference URL from fix11_fix10"
        required: true
        default: "https://mast.stsci.edu/api/v0.1/Download/file?uri=mast%3AHLSP%2Furl%2Fcgi-bin%2Fgetdata.cgi%3Fdataset%3Dhlsp_frontier_hst_wfc3-30mas_macs0416_f125w_v1.0_drz"
        type: string
      raw_to_drizzled_command:
        description: "Optional explicit repo command that generates the drizzled FITS product"
        required: false
        default: ""
        type: string
      flt_artifact_url:
        description: "Optional ZIP URL containing public/generated FLT/FLC inputs for AstroDrizzle"
        required: false
        default: ""
        type: string
      flt_datauri_csv:
        description: "Optional comma-separated MAST dataURI list for FLT/FLC products"
        required: false
        default: ""
        type: string
      allow_mast_flt_query:
        description: "If true, query MAST for MACS0416/F125W FLT/FLC inputs when no FLT inputs are supplied"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      max_mast_flt_products:
        description: "Maximum FLT/FLC products to download from MAST query"
        required: true
        default: "40"
        type: string
      allow_drizzlepac_install:
        description: "If true, attempt to install/import drizzlepac and run AstroDrizzle"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      generated_drizzled_glob:
        description: "Comma-separated glob patterns for generated drizzled FITS products"
        required: false
        default: "ti_work/**/*.fits,ti_work/**/*.fits.gz,results/**/*.fits,results/**/*.fits.gz,outputs/**/*.fits,outputs/**/*.fits.gz,artifacts/**/*.fits,artifacts/**/*.fits.gz,**/*drz*.fits,**/*drz*.fits.gz,**/*drc*.fits,**/*drc*.fits.gz,**/*drizzled*.fits,**/*drizzled*.fits.gz"
        type: string

jobs:
  raw_to_drizzled_self_contained_generator_fix2:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install baseline Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install numpy scipy astropy requests astroquery

      - name: Prepare TI work directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ti_work/results/logs
          mkdir -p ti_work/results/ledgers
          mkdir -p ti_work/results/contracts
          mkdir -p ti_work/results/reports
          mkdir -p ti_work/inputs/reference
          mkdir -p ti_work/inputs/flt
          mkdir -p ti_work/generated/drizzle

      - name: Write self-contained generator harness
        shell: bash
        run: |
          set -euo pipefail
          cat > ti_work/ti_raw_to_drizzled_self_contained_generator_fix2.py <<'PY'
          import os
          import re
          import glob
          import json
          import time
          import shutil
          import zipfile
          import hashlib
          import subprocess
          import traceback
          from datetime import datetime, timezone
          from urllib.parse import urlencode

          import numpy as np
          import requests
          from astropy.io import fits

          try:
              from astroquery.mast import Observations
              ASTROQUERY_AVAILABLE = True
              ASTROQUERY_ERROR = None
          except Exception as e:
              Observations = None
              ASTROQUERY_AVAILABLE = False
              ASTROQUERY_ERROR = repr(e)

          STAGE_TAG = "github_raw_to_drizzled_self_contained_generator_fix2"
          FIX10_CERTIFICATE = "phase4z6_fix11_fix10_mast_exact_datauri_public_hlsp_drizzled_sci_reference_download_verified_contract_compiled"
          FIX11_CERTIFICATE = "phase4z6_fix11_fix11_github_verified_hlsp_reference_imported_rerun_blocked_no_generated_drizzled_product"
          FIX12_CERTIFICATE = "phase4z6_fix11_fix12_imported_fix1_missing_generator_blocker_self_contained_generator_workflow_compiled"

          HLSP_REFERENCE_URL = os.environ.get("HLSP_REFERENCE_URL", "").strip()
          RAW_TO_DRIZZLED_COMMAND = os.environ.get("RAW_TO_DRIZZLED_COMMAND", "").strip()
          FLT_ARTIFACT_URL = os.environ.get("FLT_ARTIFACT_URL", "").strip()
          FLT_DATAURI_CSV = os.environ.get("FLT_DATAURI_CSV", "").strip()
          ALLOW_MAST_FLT_QUERY = os.environ.get("ALLOW_MAST_FLT_QUERY", "true").strip().lower() == "true"
          MAX_MAST_FLT_PRODUCTS = int(os.environ.get("MAX_MAST_FLT_PRODUCTS", "40").strip() or "40")
          ALLOW_DRIZZLEPAC_INSTALL = os.environ.get("ALLOW_DRIZZLEPAC_INSTALL", "true").strip().lower() == "true"
          GENERATED_DRIZZLED_GLOB = os.environ.get("GENERATED_DRIZZLED_GLOB", "").strip()

          REPO_ROOT = os.getcwd()
          WORK = os.path.join(REPO_ROOT, "ti_work")
          INPUTS = os.path.join(WORK, "inputs")
          REF_DIR = os.path.join(INPUTS, "reference")
          FLT_DIR = os.path.join(INPUTS, "flt")
          GENERATED_DIR = os.path.join(WORK, "generated")
          DRIZZLE_DIR = os.path.join(GENERATED_DIR, "drizzle")
          RESULTS = os.path.join(WORK, "results")
          LEDGERS = os.path.join(RESULTS, "ledgers")
          CONTRACTS = os.path.join(RESULTS, "contracts")
          REPORTS = os.path.join(RESULTS, "reports")
          LOGS = os.path.join(RESULTS, "logs")

          for p in [REF_DIR, FLT_DIR, DRIZZLE_DIR, RESULTS, LEDGERS, CONTRACTS, REPORTS, LOGS]:
              os.makedirs(p, exist_ok=True)

          FITS_EXTENSIONS = (".fits", ".fit", ".fts", ".fits.gz", ".fit.gz", ".fts.gz", ".fz")
          FLT_EXTENSIONS = ("_flt.fits", "_flc.fits", "_flt.fits.gz", "_flc.fits.gz")
          MAST_DOWNLOAD_URL = "https://mast.stsci.edu/api/v0.1/Download/file"

          BAD_FILE_BASENAME_TOKENS = [
              "wht", "weight", "ctx", "context", "rms", "ivar", "mask",
              "seg", "segm", "bkg", "background", "psf", "cat", "catalog",
              "tar", "tar.gz", "zip", "raw", "asn", "readme",
              "html", "png", "jpg", "jpeg", "gif", "pdf", "ecsv", "xml", "log"
          ]

          GOOD_DRIZZLED_TOKENS = ["drz", "drc", "drizzle", "drizzled", "mosaic", "macs0416", "f125w"]

          def now():
              return datetime.now(timezone.utc).isoformat()

          def write_json(path, obj):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              tmp = path + ".tmp"
              with open(tmp, "w", encoding="utf-8") as f:
                  json.dump(obj, f, indent=2, sort_keys=True, ensure_ascii=False)
              os.replace(tmp, path)

          def write_text(path, text):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              tmp = path + ".tmp"
              with open(tmp, "w", encoding="utf-8") as f:
                  f.write(text)
              os.replace(tmp, path)

          def sha256_file(path, prefix_bytes=64 * 1024 * 1024, full_hash_max_bytes=512 * 1024 * 1024):
              out = {
                  "path": path,
                  "exists": os.path.exists(path) if path else False,
                  "size_bytes": None,
                  "sha256_full": None,
                  "sha256_prefix_bytes": None,
                  "sha256_prefix": None,
                  "hash_error": None,
              }
              if not path or not os.path.exists(path):
                  return out
              try:
                  size = os.path.getsize(path)
                  out["size_bytes"] = int(size)

                  hp = hashlib.sha256()
                  remaining = min(size, prefix_bytes)
                  with open(path, "rb") as f:
                      while remaining > 0:
                          chunk = f.read(min(1024 * 1024, remaining))
                          if not chunk:
                              break
                          hp.update(chunk)
                          remaining -= len(chunk)
                  out["sha256_prefix_bytes"] = int(min(size, prefix_bytes))
                  out["sha256_prefix"] = hp.hexdigest()

                  if size <= full_hash_max_bytes:
                      hf = hashlib.sha256()
                      with open(path, "rb") as f:
                          for chunk in iter(lambda: f.read(1024 * 1024), b""):
                              hf.update(chunk)
                      out["sha256_full"] = hf.hexdigest()
                  return out
              except Exception as e:
                  out["hash_error"] = repr(e)
                  return out

          def norm_compact(s):
              return re.sub(r"[^a-z0-9]+", "", str(s or "").lower())

          def is_fits_like(path_or_name):
              return str(path_or_name).lower().endswith(FITS_EXTENSIONS)

          def is_flt_like(path_or_name):
              return str(path_or_name).lower().endswith(FLT_EXTENSIONS)

          def is_bad_aux_or_raw_basename(path_or_name):
              base = os.path.basename(str(path_or_name or ""))
              n = norm_compact(base)
              return any(norm_compact(tok) in n for tok in BAD_FILE_BASENAME_TOKENS)

          def mast_download_url(uri):
              return MAST_DOWNLOAD_URL + "?" + urlencode({"uri": uri})

          def row_get(row, name, default=""):
              try:
                  if hasattr(row, "colnames") and name in row.colnames:
                      return row[name]
                  if hasattr(row, "_table") and name in row._table.colnames:
                      return row[name]
              except Exception:
                  pass
              try:
                  return row[name]
              except Exception:
                  return default

          def run_shell(command, label, cwd=REPO_ROOT, timeout_seconds=24000):
              out = {
                  "label": label,
                  "command": command,
                  "cwd": cwd,
                  "attempted": True,
                  "exit_status": None,
                  "stdout_path": os.path.join(LOGS, f"{label}.stdout.log"),
                  "stderr_path": os.path.join(LOGS, f"{label}.stderr.log"),
                  "error": None,
              }
              try:
                  with open(out["stdout_path"], "w", encoding="utf-8") as stdout, open(out["stderr_path"], "w", encoding="utf-8") as stderr:
                      proc = subprocess.run(command, shell=True, cwd=cwd, stdout=stdout, stderr=stderr, timeout=timeout_seconds)
                  out["exit_status"] = int(proc.returncode)
              except Exception as e:
                  out["error"] = repr(e)
                  out["traceback"] = traceback.format_exc()[-4000:]
              return out

          def download_url(url, out_path, timeout=180, max_bytes=5_000_000_000):
              result = {
                  "url": url,
                  "out_path": out_path,
                  "ok": False,
                  "status_code": None,
                  "content_type": None,
                  "content_length": None,
                  "bytes_written": 0,
                  "error": None,
                  "final_url": url,
              }
              try:
                  headers = {"User-Agent": "TI-PaperII-SelfContainedRawToDrizzledFix2/1.0"}
                  with requests.get(url, stream=True, timeout=timeout, allow_redirects=True, headers=headers) as r:
                      result["status_code"] = int(r.status_code)
                      result["content_type"] = r.headers.get("content-type")
                      result["content_length"] = int(r.headers.get("content-length", "0") or 0)
                      result["final_url"] = r.url
                      if not (200 <= r.status_code < 400):
                          result["error"] = f"http_status:{r.status_code}"
                          return result
                      if result["content_length"] and result["content_length"] > max_bytes:
                          result["error"] = f"content_length_exceeds_limit:{result['content_length']}"
                          return result
                      tmp = out_path + ".tmp"
                      written = 0
                      with open(tmp, "wb") as f:
                          for chunk in r.iter_content(chunk_size=1024 * 1024):
                              if not chunk:
                                  continue
                              f.write(chunk)
                              written += len(chunk)
                              if written > max_bytes:
                                  result["error"] = f"download_exceeds_limit:{written}"
                                  try:
                                      os.remove(tmp)
                                  except Exception:
                                      pass
                                  return result
                      os.replace(tmp, out_path)
                      result["bytes_written"] = written
                      result["ok"] = True
              except Exception as e:
                  result["error"] = repr(e)
                  result["traceback"] = traceback.format_exc()[-4000:]
              return result

          def download_reference():
              out_path = os.path.join(REF_DIR, "verified_hlsp_reference.fits")
              return download_url(HLSP_REFERENCE_URL, out_path)

          def inspect_fits(path):
              out = {
                  "path": path,
                  "path_rel_repo": os.path.relpath(path, REPO_ROOT) if os.path.exists(path) else None,
                  "basename": os.path.basename(path or ""),
                  "exists": os.path.exists(path),
                  "hash": sha256_file(path),
                  "fits_openable": False,
                  "fits_error": None,
                  "hdu_count": None,
                  "image_hdu_candidates": [],
                  "selected_hdu_index": None,
                  "selected_shape": None,
                  "selected_pixels": None,
                  "wcs_like": False,
                  "product_role": "unknown",
                  "auxiliary_or_raw_like": is_bad_aux_or_raw_basename(path),
              }
              if not os.path.exists(path):
                  out["fits_error"] = "missing_file"
                  return out
              try:
                  with fits.open(path, memmap=True, lazy_load_hdus=True) as hdul:
                      out["fits_openable"] = True
                      out["hdu_count"] = len(hdul)
                      candidates = []
                      for idx, hdu in enumerate(hdul):
                          data = getattr(hdu, "data", None)
                          if data is None:
                              continue
                          try:
                              shape = tuple(int(x) for x in data.shape)
                          except Exception:
                              continue
                          if len(shape) < 2:
                              continue
                          hdr = hdu.header
                          pixels = int(shape[-1] * shape[-2])
                          wcs_keys = [k for k in [
                              "CTYPE1", "CTYPE2", "CRPIX1", "CRPIX2", "CRVAL1", "CRVAL2",
                              "CDELT1", "CDELT2", "CD1_1", "CD1_2", "CD2_1", "CD2_2",
                              "PC1_1", "PC1_2", "PC2_1", "PC2_2", "CUNIT1", "CUNIT2",
                              "RADESYS", "EQUINOX", "WCSNAME"
                          ] if k in hdr]
                          wcs_like = (
                              ("CTYPE1" in hdr and "CTYPE2" in hdr)
                              and (
                                  ("CRPIX1" in hdr and "CRPIX2" in hdr)
                                  or ("CD1_1" in hdr and "CD2_2" in hdr)
                                  or ("CDELT1" in hdr and "CDELT2" in hdr)
                                  or ("PC1_1" in hdr and "PC2_2" in hdr)
                              )
                          )
                          candidates.append({
                              "hdu_index": idx,
                              "extname": str(hdr.get("EXTNAME", "")),
                              "shape": shape,
                              "pixels": pixels,
                              "dtype": str(data.dtype),
                              "wcs_like": bool(wcs_like),
                              "wcs_keys_present": sorted(wcs_keys),
                              "bunit": str(hdr.get("BUNIT", "")),
                              "filter": str(hdr.get("FILTER", hdr.get("FILTER1", ""))),
                              "instrume": str(hdr.get("INSTRUME", "")),
                              "detector": str(hdr.get("DETECTOR", "")),
                              "object": str(hdr.get("OBJECT", "")),
                              "targname": str(hdr.get("TARGNAME", "")),
                          })
                      out["image_hdu_candidates"] = candidates
                      if candidates:
                          selected = sorted(candidates, key=lambda x: (0 if x["wcs_like"] else 1, -x["pixels"]))[0]
                          out["selected_hdu_index"] = selected["hdu_index"]
                          out["selected_shape"] = selected["shape"]
                          out["selected_pixels"] = selected["pixels"]
                          out["wcs_like"] = bool(selected["wcs_like"])
                          if out["auxiliary_or_raw_like"]:
                              out["product_role"] = "auxiliary_or_raw_like"
                          elif out["wcs_like"] and (out["selected_pixels"] or 0) >= 1_000_000:
                              out["product_role"] = "science_image_candidate"
                          else:
                              out["product_role"] = "image_not_contract_ready"
              except Exception as e:
                  out["fits_error"] = repr(e)
                  out["traceback"] = traceback.format_exc()[-4000:]
              return out

          def select_image_array(path, hdu_index):
              with fits.open(path, memmap=True, lazy_load_hdus=True) as hdul:
                  data = hdul[hdu_index].data
                  arr = np.asarray(data, dtype=np.float64)
                  if arr.ndim > 2:
                      arr = arr.reshape((-1,) + arr.shape[-2:])[0]
                  return arr

          def compare_arrays(reference_path, reference_hdu, generated_path, generated_hdu):
              ref = select_image_array(reference_path, reference_hdu)
              gen = select_image_array(generated_path, generated_hdu)

              result = {
                  "reference_shape": tuple(int(x) for x in ref.shape),
                  "generated_shape": tuple(int(x) for x in gen.shape),
                  "same_shape": tuple(ref.shape) == tuple(gen.shape),
                  "comparison_attempted": False,
                  "error": None,
              }
              if not result["same_shape"]:
                  result["error"] = "shape_mismatch"
                  return result

              mask = np.isfinite(ref) & np.isfinite(gen)
              finite_count = int(mask.sum())
              total_count = int(mask.size)
              result["comparison_attempted"] = True
              result["finite_count"] = finite_count
              result["total_count"] = total_count
              result["finite_fraction"] = float(finite_count / total_count) if total_count else 0.0
              if finite_count == 0:
                  result["error"] = "no_finite_overlap"
                  return result

              d = gen[mask] - ref[mask]
              ad = np.abs(d)
              ref_abs = np.abs(ref[mask])
              ref_scale = float(np.nanpercentile(ref_abs, 99)) if finite_count else 0.0
              ref_scale = max(ref_scale, 1.0)

              result.update({
                  "max_abs_diff": float(np.nanmax(ad)),
                  "mean_abs_diff": float(np.nanmean(ad)),
                  "median_abs_diff": float(np.nanmedian(ad)),
                  "p90_abs_diff": float(np.nanpercentile(ad, 90)),
                  "p95_abs_diff": float(np.nanpercentile(ad, 95)),
                  "p99_abs_diff": float(np.nanpercentile(ad, 99)),
                  "rms_abs_diff": float(np.sqrt(np.nanmean(d * d))),
                  "reference_abs_p99_scale": ref_scale,
                  "max_rel_to_ref_p99": float(np.nanmax(ad) / ref_scale),
                  "p99_rel_to_ref_p99": float(np.nanpercentile(ad, 99) / ref_scale),
                  "arrays_bitwise_equal_on_finite": bool(np.array_equal(gen[mask], ref[mask])),
                  "allclose_rtol_1e_6_atol_1e_8": bool(np.allclose(gen[mask], ref[mask], rtol=1e-6, atol=1e-8)),
                  "allclose_rtol_1e_5_atol_1e_7": bool(np.allclose(gen[mask], ref[mask], rtol=1e-5, atol=1e-7)),
              })
              result["numeric_replay_supported_strict"] = bool(
                  result["finite_fraction"] >= 0.999
                  and (
                      result["arrays_bitwise_equal_on_finite"]
                      or result["allclose_rtol_1e_6_atol_1e_8"]
                      or (
                          result["p99_abs_diff"] <= max(1e-6, 1e-8 * ref_scale)
                          and result["max_abs_diff"] <= max(1e-4, 1e-6 * ref_scale)
                      )
                  )
              )
              return result

          def download_flt_artifact_zip():
              ledger = {"attempted": bool(FLT_ARTIFACT_URL), "url": FLT_ARTIFACT_URL, "ok": False, "error": None, "extracted_files": []}
              if not FLT_ARTIFACT_URL:
                  return ledger
              zip_path = os.path.join(INPUTS, "flt_artifact.zip")
              dl = download_url(FLT_ARTIFACT_URL, zip_path, timeout=180, max_bytes=5_000_000_000)
              ledger["download"] = dl
              if not dl.get("ok"):
                  ledger["error"] = dl.get("error")
                  return ledger
              try:
                  with zipfile.ZipFile(zip_path, "r") as z:
                      z.extractall(FLT_DIR)
                      ledger["ok"] = True
                      ledger["extracted_files"] = [i.filename for i in z.infolist()]
              except Exception as e:
                  ledger["error"] = repr(e)
                  ledger["traceback"] = traceback.format_exc()[-4000:]
              return ledger

          def download_datauri_list():
              ledger = {"attempted": bool(FLT_DATAURI_CSV), "count": 0, "downloads": []}
              uris = [u.strip() for u in FLT_DATAURI_CSV.split(",") if u.strip()]
              for idx, uri in enumerate(uris, start=1):
                  fn = os.path.basename(uri.split("?")[-1]) or f"flt_datauri_{idx:03d}.fits"
                  if not fn.lower().endswith((".fits", ".fits.gz")):
                      fn = f"flt_datauri_{idx:03d}.fits"
                  out_path = os.path.join(FLT_DIR, fn)
                  url = mast_download_url(uri)
                  dl = download_url(url, out_path, timeout=180, max_bytes=1_000_000_000)
                  dl["data_uri"] = uri
                  ledger["downloads"].append(dl)
              ledger["count"] = len(ledger["downloads"])
              return ledger

          def mast_query_flt_products():
              ledger = {
                  "attempted": ALLOW_MAST_FLT_QUERY,
                  "astroquery_available": ASTROQUERY_AVAILABLE,
                  "error": None,
                  "obs_count": 0,
                  "product_count": 0,
                  "selected_product_count": 0,
                  "downloads": [],
              }
              if not ALLOW_MAST_FLT_QUERY:
                  return ledger
              if not ASTROQUERY_AVAILABLE:
                  ledger["error"] = "astroquery_unavailable:" + str(ASTROQUERY_ERROR)
                  return ledger

              try:
                  obs_tables = []

                  for target_name in ["MACS0416", "MACS J0416.1-2403", "MACSJ0416.1-2403"]:
                      try:
                          obs = Observations.query_criteria(
                              obs_collection="HST",
                              filters="F125W",
                              instrument_name="WFC3/IR",
                              target_name=target_name,
                          )
                          if len(obs) > 0:
                              obs_tables.append(obs)
                      except Exception as e:
                          ledger.setdefault("target_query_errors", []).append({"target": target_name, "error": repr(e)})

                  if not obs_tables:
                      try:
                          obs = Observations.query_criteria(
                              obs_collection="HST",
                              filters="F125W",
                              instrument_name="WFC3/IR",
                          )
                          obs_tables.append(obs)
                      except Exception as e:
                          ledger["error"] = "broad_f125w_query_failed:" + repr(e)
                          return ledger

                  obsids = []
                  obs_rows_brief = []

                  for obs in obs_tables:
                      colnames = list(getattr(obs, "colnames", []))
                      for row in obs:
                          text = " ".join(str(row_get(row, col, "")) for col in colnames)
                          if "0416" in text or "MACS" in text or "macs" in text:
                              obsid = str(row_get(row, "obsid", ""))
                              if obsid:
                                  obsids.append(obsid)
                                  obs_rows_brief.append({col: str(row_get(row, col, "")) for col in colnames[:30]})

                  obsids = list(dict.fromkeys(obsids))
                  ledger["obs_count"] = len(obsids)
                  ledger["obs_rows_brief_top50"] = obs_rows_brief[:50]

                  selected_products = []
                  for obsid in obsids[:80]:
                      try:
                          prods = Observations.get_product_list(obsid)
                          pcols = list(getattr(prods, "colnames", []))
                          ledger["product_count"] += len(prods)

                          for p in prods:
                              fn = str(row_get(p, "productFilename", ""))
                              desc = str(row_get(p, "productSubGroupDescription", ""))
                              uri = str(row_get(p, "dataURI", ""))
                              low = (fn + " " + desc + " " + uri).lower()

                              if ("_flt.fits" in low or "_flc.fits" in low or " flt" in low or " flc" in low) and ("f125w" in low or "f125" in low):
                                  selected_products.append({"row": p, "cols": pcols, "filename": fn, "dataURI": uri, "description": desc})
                      except Exception as e:
                          ledger.setdefault("product_query_errors", []).append({"obsid": obsid, "error": repr(e)})

                  selected_products = selected_products[:MAX_MAST_FLT_PRODUCTS]
                  ledger["selected_product_count"] = len(selected_products)

                  for idx, item in enumerate(selected_products, start=1):
                      fn = item["filename"] or f"mast_flt_{idx:03d}.fits"
                      uri = item["dataURI"]
                      out_path = os.path.join(FLT_DIR, os.path.basename(fn))
                      if uri:
                          url = mast_download_url(uri)
                          dl = download_url(url, out_path, timeout=180, max_bytes=1_000_000_000)
                          dl["data_uri"] = uri
                          dl["product_filename"] = fn
                          ledger["downloads"].append(dl)

              except Exception as e:
                  ledger["error"] = repr(e)
                  ledger["traceback"] = traceback.format_exc()[-4000:]

              return ledger

          def collect_flt_inputs():
              flts = []
              for p in glob.glob(os.path.join(FLT_DIR, "**", "*"), recursive=True):
                  if os.path.isfile(p) and is_flt_like(p):
                      flts.append(os.path.abspath(p))
              return sorted(set(flts))

          def install_drizzlepac_if_needed():
              result = {
                  "attempted": ALLOW_DRIZZLEPAC_INSTALL,
                  "available_before": False,
                  "available_after": False,
                  "install": None,
                  "import_error": None,
              }
              try:
                  import drizzlepac
                  result["available_before"] = True
                  result["available_after"] = True
                  return result
              except Exception as e:
                  result["import_error"] = repr(e)

              if not ALLOW_DRIZZLEPAC_INSTALL:
                  return result

              install_cmd = "python -m pip install drizzlepac stwcs stsci.tools stsci.skypac"
              result["install"] = run_shell(install_cmd, "install_drizzlepac", cwd=REPO_ROOT, timeout_seconds=3000)

              try:
                  import drizzlepac
                  result["available_after"] = True
              except Exception as e:
                  result["import_error_after_install"] = repr(e)

              return result

          def run_astrodrizzle(flt_paths):
              result = {"attempted": False, "ok": False, "error": None, "output_files": []}
              if not flt_paths:
                  result["error"] = "no_flt_inputs"
                  return result

              try:
                  from drizzlepac import astrodrizzle
              except Exception as e:
                  result["error"] = "drizzlepac_import_failed:" + repr(e)
                  return result

              result["attempted"] = True
              old_cwd = os.getcwd()
              os.makedirs(DRIZZLE_DIR, exist_ok=True)

              try:
                  os.chdir(DRIZZLE_DIR)
                  input_list = ",".join(flt_paths)
                  astrodrizzle.AstroDrizzle(
                      input_list,
                      output="ti_macs0416_f125w_fix2",
                      build=True,
                      clean=True,
                      preserve=False,
                      skysub=True,
                      driz_sep_bits=64,
                      final_bits=64,
                      final_wht_type="IVM",
                  )
                  result["ok"] = True
              except Exception as e:
                  result["error"] = repr(e)
                  result["traceback"] = traceback.format_exc()[-8000:]
              finally:
                  os.chdir(old_cwd)

              outputs = []
              for p in glob.glob(os.path.join(DRIZZLE_DIR, "**", "*"), recursive=True):
                  if os.path.isfile(p) and is_fits_like(p):
                      outputs.append(os.path.abspath(p))
              result["output_files"] = outputs
              return result

          def collect_generated_candidates(reference_path):
              patterns = [p.strip() for p in GENERATED_DRIZZLED_GLOB.split(",") if p.strip()]
              if not patterns:
                  patterns = [
                      "ti_work/**/*.fits", "ti_work/**/*.fits.gz",
                      "results/**/*.fits", "results/**/*.fits.gz",
                      "outputs/**/*.fits", "outputs/**/*.fits.gz",
                      "artifacts/**/*.fits", "artifacts/**/*.fits.gz",
                      "**/*drz*.fits", "**/*drz*.fits.gz",
                      "**/*drc*.fits", "**/*drc*.fits.gz",
                      "**/*drizzled*.fits", "**/*drizzled*.fits.gz",
                  ]

              paths = []
              for pat in patterns:
                  paths.extend(glob.glob(pat, recursive=True))

              ref_abs = os.path.abspath(reference_path) if reference_path else ""
              out = []

              for p in sorted(set(paths)):
                  if not os.path.isfile(p):
                      continue
                  ap = os.path.abspath(p)
                  if ap == ref_abs:
                      continue
                  if "/.git/" in ap:
                      continue
                  if not is_fits_like(ap):
                      continue

                  compact = norm_compact(os.path.basename(ap))
                  score = 0
                  reasons = []

                  for tok in GOOD_DRIZZLED_TOKENS:
                      if norm_compact(tok) in compact:
                          score += 5
                          reasons.append(f"basename_locator_token:{tok}")

                  if ap.startswith(os.path.abspath(DRIZZLE_DIR)):
                      score += 30
                      reasons.append("inside_self_contained_drizzle_output_dir")

                  if is_bad_aux_or_raw_basename(ap):
                      score -= 50
                      reasons.append("bad_aux_or_raw_basename")

                  if "verified_hlsp_reference" in compact:
                      score -= 100
                      reasons.append("reference_file_exclusion")

                  out.append({
                      "path": ap,
                      "path_rel_repo": os.path.relpath(ap, REPO_ROOT),
                      "size_bytes": os.path.getsize(ap),
                      "locator_score": score,
                      "locator_reasons": reasons,
                      "token_matches_are_locator_only_not_evidence": True,
                  })

              return sorted(out, key=lambda x: (-x["locator_score"], -x["size_bytes"]))

          def main():
              run_started = time.time()

              sanity = {
                  "timestamp_utc": now(),
                  "stage_tag": STAGE_TAG,
                  "github_actions": True,
                  "repo_root": REPO_ROOT,
                  "hlsp_reference_url_supplied": bool(HLSP_REFERENCE_URL),
                  "raw_to_drizzled_command_supplied": bool(RAW_TO_DRIZZLED_COMMAND),
                  "flt_artifact_url_supplied": bool(FLT_ARTIFACT_URL),
                  "flt_datauri_csv_supplied": bool(FLT_DATAURI_CSV),
                  "allow_mast_flt_query": ALLOW_MAST_FLT_QUERY,
                  "allow_drizzlepac_install": ALLOW_DRIZZLEPAC_INSTALL,
                  "max_mast_flt_products": MAX_MAST_FLT_PRODUCTS,
                  "no_semantics_as_evidence": True,
                  "raw_to_drizzled_claimed": False,
                  "full_public_dark_matter_closure_claimed": False,
              }
              write_json(os.path.join(RESULTS, "mount_root_sanity.json"), sanity)

              predecessor = {
                  "timestamp_utc": now(),
                  "stage_tag": STAGE_TAG,
                  "fix10_certificate": FIX10_CERTIFICATE,
                  "fix11_certificate": FIX11_CERTIFICATE,
                  "fix12_certificate": FIX12_CERTIFICATE,
                  "claim_ceiling": "github_generation_and_numeric_artifact_only_until_drive_import",
                  "raw_to_drizzled_claimed": False,
                  "full_public_dark_matter_closure_claimed": False,
              }
              write_json(os.path.join(CONTRACTS, "predecessor_contract.json"), predecessor)

              reference_download = download_reference() if HLSP_REFERENCE_URL else {"ok": False, "error": "missing_hlsp_reference_url"}
              reference_inspection = inspect_fits(reference_download.get("out_path")) if reference_download.get("ok") else {"fits_openable": False, "fits_error": reference_download.get("error")}
              write_json(os.path.join(LEDGERS, "public_reference_download_ledger.json"), reference_download)
              write_json(os.path.join(LEDGERS, "public_reference_fits_inspection.json"), reference_inspection)

              explicit_command_result = None
              if RAW_TO_DRIZZLED_COMMAND:
                  explicit_command_result = run_shell(RAW_TO_DRIZZLED_COMMAND, "explicit_raw_to_drizzled_command")
              write_json(os.path.join(LEDGERS, "explicit_generation_command_ledger.json"), {
                  "attempted": bool(RAW_TO_DRIZZLED_COMMAND),
                  "result": explicit_command_result,
              })

              flt_artifact = download_flt_artifact_zip()
              datauri_list = download_datauri_list()
              mast_flt = mast_query_flt_products()
              flt_inputs = collect_flt_inputs()

              write_json(os.path.join(LEDGERS, "flt_artifact_download_ledger.json"), flt_artifact)
              write_json(os.path.join(LEDGERS, "flt_datauri_download_ledger.json"), datauri_list)
              write_json(os.path.join(LEDGERS, "mast_flt_query_download_ledger.json"), mast_flt)
              write_json(os.path.join(LEDGERS, "flt_input_inventory.json"), {
                  "timestamp_utc": now(),
                  "flt_input_count": len(flt_inputs),
                  "flt_inputs": [{"path": p, "path_rel_repo": os.path.relpath(p, REPO_ROOT), "receipt": sha256_file(p)} for p in flt_inputs[:200]],
              })

              drizzlepac_install = install_drizzlepac_if_needed()
              write_json(os.path.join(LEDGERS, "drizzlepac_install_import_ledger.json"), drizzlepac_install)

              astrodrizzle_result = run_astrodrizzle(flt_inputs)
              write_json(os.path.join(LEDGERS, "astrodrizzle_generation_ledger.json"), astrodrizzle_result)

              generated_candidates = collect_generated_candidates(reference_download.get("out_path"))
              inspected_generated = []

              for cand in generated_candidates[:300]:
                  insp = inspect_fits(cand["path"])
                  rec = dict(cand)
                  rec["fits_inspection"] = insp
                  rec["contract_ready_candidate"] = bool(
                      insp.get("fits_openable")
                      and insp.get("wcs_like")
                      and insp.get("product_role") == "science_image_candidate"
                      and not insp.get("auxiliary_or_raw_like")
                  )
                  rec["same_shape_as_reference"] = bool(insp.get("selected_shape") == reference_inspection.get("selected_shape"))
                  inspected_generated.append(rec)

              inspected_generated = sorted(
                  inspected_generated,
                  key=lambda x: (
                      0 if x.get("contract_ready_candidate") else 1,
                      0 if x.get("same_shape_as_reference") else 1,
                      0 if x.get("path", "").startswith(os.path.abspath(DRIZZLE_DIR)) else 1,
                      -int(x.get("locator_score") or 0),
                      -int(x.get("size_bytes") or 0),
                  )
              )

              write_json(os.path.join(LEDGERS, "generated_drizzled_candidate_ledger.json"), {
                  "timestamp_utc": now(),
                  "candidate_count": len(generated_candidates),
                  "inspected_candidate_count": len(inspected_generated),
                  "candidates": inspected_generated,
                  "token_matches_are_locator_only_not_evidence": True,
              })

              selected_generated = inspected_generated[0] if inspected_generated else None

              if reference_download.get("ok") and reference_inspection.get("fits_openable") and selected_generated and selected_generated.get("contract_ready_candidate"):
                  comparison = compare_arrays(
                      reference_download["out_path"],
                      reference_inspection["selected_hdu_index"],
                      selected_generated["path"],
                      selected_generated["fits_inspection"]["selected_hdu_index"],
                  )
              else:
                  comparison = {"comparison_attempted": False, "reason": None}
                  if not reference_download.get("ok"):
                      comparison["reason"] = "reference_download_failed"
                  elif not reference_inspection.get("fits_openable"):
                      comparison["reason"] = "reference_fits_not_openable"
                  elif not flt_inputs and not RAW_TO_DRIZZLED_COMMAND:
                      comparison["reason"] = "no_flt_inputs_and_no_explicit_generation_command"
                  elif flt_inputs and not drizzlepac_install.get("available_after"):
                      comparison["reason"] = "flt_inputs_available_but_drizzlepac_unavailable"
                  elif flt_inputs and not astrodrizzle_result.get("ok"):
                      comparison["reason"] = "astrodrizzle_generation_failed"
                  elif not selected_generated:
                      comparison["reason"] = "no_generated_drizzled_candidate_found"
                  elif not selected_generated.get("contract_ready_candidate"):
                      comparison["reason"] = "no_contract_ready_generated_drizzled_candidate_found"

              comparison_artifact = {
                  "timestamp_utc": now(),
                  "stage_tag": STAGE_TAG,
                  "reference": {
                      "url": HLSP_REFERENCE_URL,
                      "download": reference_download,
                      "fits_inspection": reference_inspection
                  },
                  "explicit_command_result": explicit_command_result,
                  "flt_inputs_count": len(flt_inputs),
                  "drizzlepac_install": drizzlepac_install,
                  "astrodrizzle_result": astrodrizzle_result,
                  "selected_generated_candidate": selected_generated,
                  "numeric_comparison": comparison,
                  "raw_to_drizzled_claimed": False,
                  "full_public_dark_matter_closure_claimed": False,
                  "no_semantics_as_evidence": True,
              }
              write_json(os.path.join(LEDGERS, "raw_to_drizzled_numeric_comparison_ledger.json"), comparison_artifact)

              if comparison.get("numeric_replay_supported_strict"):
                  decision = "raw_to_drizzled_numeric_replay_supported_strict_import_required"
                  certificate_id = "github_raw_to_drizzled_fix2_numeric_replay_supported_strict_import_required"
                  raw_to_drizzled_supported = True
                  next_action = "import_github_artifact_into_drive_and_certify_raw_to_drizzled_numeric_replay"
              elif comparison.get("comparison_attempted"):
                  decision = "raw_to_drizzled_numeric_comparison_completed_not_strict_pass"
                  certificate_id = "github_raw_to_drizzled_fix2_numeric_comparison_completed_not_strict_pass"
                  raw_to_drizzled_supported = False
                  next_action = "import_github_artifact_and_adjudicate_numeric_mismatch_or_threshold"
              else:
                  reason = comparison.get("reason") or "unknown_blocker"
                  decision = f"raw_to_drizzled_self_contained_generator_blocked_{reason}"
                  certificate_id = f"github_raw_to_drizzled_fix2_blocked_{reason}"
                  raw_to_drizzled_supported = False
                  next_action = "import_github_artifact_and_fix_generation_blocker_before_claim"

              certificate = {
                  "timestamp_utc": now(),
                  "stage_tag": STAGE_TAG,
                  "certificate_id": certificate_id,
                  "decision": decision,
                  "reference_download_ok": bool(reference_download.get("ok")),
                  "reference_fits_openable": bool(reference_inspection.get("fits_openable")),
                  "flt_input_count": len(flt_inputs),
                  "drizzlepac_available_after": bool(drizzlepac_install.get("available_after")),
                  "astrodrizzle_attempted": bool(astrodrizzle_result.get("attempted")),
                  "astrodrizzle_ok": bool(astrodrizzle_result.get("ok")),
                  "generated_candidate_count": len(generated_candidates),
                  "selected_generated_path": selected_generated.get("path_rel_repo") if selected_generated else None,
                  "comparison_attempted": bool(comparison.get("comparison_attempted")),
                  "raw_to_drizzled_numeric_replay_supported_strict": raw_to_drizzled_supported,
                  "raw_to_drizzled_claimed": False,
                  "full_public_dark_matter_closure_claimed": False,
                  "claim_ceiling": "github_numeric_artifact_requires_colab_drive_import_before_public_closure_claim",
                  "next_action": next_action,
                  "no_semantics_as_evidence": True,
              }
              write_json(os.path.join(RESULTS, "certificate.json"), certificate)

              route_settlement = {
                  "timestamp_utc": now(),
                  "stage_tag": STAGE_TAG,
                  "route": "github_raw_to_drizzled_self_contained_generator_fix2",
                  "settlement": decision,
                  "certificate_id": certificate_id,
                  "scientific_failure": False if "blocked" in decision else None,
                  "administrative_or_artifact_blocker": "blocked" in decision,
                  "next_route": next_action,
                  "raw_to_drizzled_claimed": False,
                  "full_public_dark_matter_closure_claimed": False,
                  "no_semantics_as_evidence": True,
              }
              write_json(os.path.join(RESULTS, "route_settlement.json"), route_settlement)

              stage_summary = {
                  "timestamp_utc": now(),
                  "stage_tag": STAGE_TAG,
                  "certificate_id": certificate_id,
                  "decision": decision,
                  "hlsp_reference_url": HLSP_REFERENCE_URL,
                  "reference_download_ok": bool(reference_download.get("ok")),
                  "reference_fits_openable": bool(reference_inspection.get("fits_openable")),
                  "reference_shape": reference_inspection.get("selected_shape"),
                  "flt_input_count": len(flt_inputs),
                  "drizzlepac_available_after": bool(drizzlepac_install.get("available_after")),
                  "astrodrizzle_attempted": bool(astrodrizzle_result.get("attempted")),
                  "astrodrizzle_ok": bool(astrodrizzle_result.get("ok")),
                  "generated_candidate_count": len(generated_candidates),
                  "inspected_generated_candidate_count": len(inspected_generated),
                  "selected_generated_path": selected_generated.get("path_rel_repo") if selected_generated else None,
                  "comparison_attempted": bool(comparison.get("comparison_attempted")),
                  "numeric_replay_supported_strict": raw_to_drizzled_supported,
                  "numeric_comparison_brief": {
                      k: comparison.get(k)
                      for k in [
                          "same_shape", "finite_fraction", "max_abs_diff", "p95_abs_diff",
                          "p99_abs_diff", "rms_abs_diff", "numeric_replay_supported_strict",
                          "reason", "error"
                      ]
                      if k in comparison
                  },
                  "runtime_seconds": float(time.time() - run_started),
                  "next_action": next_action,
                  "raw_to_drizzled_claimed": False,
                  "full_public_dark_matter_closure_claimed": False,
              }
              write_json(os.path.join(RESULTS, "stage_summary.json"), stage_summary)

              readme = []
              readme.append("# TI Paper II Raw-to-Drizzled Self-Contained Generator Fix2 Artifact")
              readme.append("")
              readme.append(f"Decision: {decision}")
              readme.append(f"Certificate: {certificate_id}")
              readme.append("")
              readme.append("This workflow does not claim full public closure by itself.")
              readme.append("Import this artifact into Drive, freeze it, and certify the numeric replay or blocker.")
              readme.append("")
              readme.append("Fix2 generation lanes:")
              readme.append("- explicit raw_to_drizzled_command")
              readme.append("- optional FLT artifact ZIP URL")
              readme.append("- optional FLT/FLC dataURI CSV")
              readme.append("- bounded MAST query for MACS0416/F125W FLT/FLC")
              readme.append("- AstroDrizzle generation if drizzlepac is available")
              write_text(os.path.join(RESULTS, "README_NEXT_ACTION.md"), "\n".join(readme))

              receipts = {"timestamp_utc": now(), "stage_tag": STAGE_TAG, "files": []}
              for dirpath, dirnames, filenames in os.walk(RESULTS):
                  for fn in filenames:
                      p = os.path.join(dirpath, fn)
                      receipts["files"].append({
                          "path_rel_results": os.path.relpath(p, RESULTS),
                          "receipt": sha256_file(p)
                      })
              write_json(os.path.join(RESULTS, "artifact_receipts.json"), receipts)

              print(json.dumps(stage_summary, indent=2, sort_keys=True))

          if __name__ == "__main__":
              try:
                  main()
              except Exception as e:
                  error_artifact = {
                      "timestamp_utc": now(),
                      "stage_tag": STAGE_TAG,
                      "decision": "github_raw_to_drizzled_fix2_harness_error",
                      "certificate_id": "github_raw_to_drizzled_fix2_harness_error",
                      "error": repr(e),
                      "traceback": traceback.format_exc(),
                      "raw_to_drizzled_claimed": False,
                      "full_public_dark_matter_closure_claimed": False,
                      "no_semantics_as_evidence": True,
                  }
                  write_json(os.path.join(RESULTS, "certificate.json"), error_artifact)
                  write_json(os.path.join(RESULTS, "stage_summary.json"), error_artifact)
                  print(json.dumps(error_artifact, indent=2, sort_keys=True))
          PY

      - name: Run self-contained generator harness
        shell: bash
        env:
          HLSP_REFERENCE_URL: ${{ inputs.hlsp_reference_url }}
          RAW_TO_DRIZZLED_COMMAND: ${{ inputs.raw_to_drizzled_command }}
          FLT_ARTIFACT_URL: ${{ inputs.flt_artifact_url }}
          FLT_DATAURI_CSV: ${{ inputs.flt_datauri_csv }}
          ALLOW_MAST_FLT_QUERY: ${{ inputs.allow_mast_flt_query }}
          MAX_MAST_FLT_PRODUCTS: ${{ inputs.max_mast_flt_products }}
          ALLOW_DRIZZLEPAC_INSTALL: ${{ inputs.allow_drizzlepac_install }}
          GENERATED_DRIZZLED_GLOB: ${{ inputs.generated_drizzled_glob }}
        run: |
          set +e
          python ti_work/ti_raw_to_drizzled_self_contained_generator_fix2.py > ti_work/results/logs/harness_fix2.stdout.log 2> ti_work/results/logs/harness_fix2.stderr.log
          status=$?
          echo "${status}" > ti_work/results/logs/harness_fix2.exit_status.txt
          cat ti_work/results/logs/harness_fix2.stdout.log || true
          exit 0

      - name: Package artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cd ti_work
          zip -r ti-paper-ii-raw-to-drizzled-self-contained-generator-fix2-results.zip results
          cp ti-paper-ii-raw-to-drizzled-self-contained-generator-fix2-results.zip results/

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ti-paper-ii-raw-to-drizzled-self-contained-generator-fix2-results
          path: ti_work/results/**
          if-no-files-found: warn
