name: TI Paper II HSTCAL DQ Direct Forensics

on:
  workflow_dispatch:
    inputs:
      raw_package_url:
        description: "URL to true-science raw package"
        required: false
        default: "https://github.com/KennePatterson/TI-Paper-II-HSTCAL-Raw-Replay/releases/download/v0.1-raw-package/TI_PAPER_II_TRUE_SCIENCE_RAW_EXPOSURE_SET_REPLAY_PACKAGE_UPDATED.zip"
        type: string
      raw_package_sha256:
        description: "Expected SHA256 for true-science raw package"
        required: false
        default: "fa792f077f14a35756f10bfafd8401ca3e8e43dbd83e9f485b7077acb543de30"
        type: string
      stenv_yaml_url:
        description: "Official stenv Linux X64 release YAML URL"
        required: false
        default: "https://github.com/spacetelescope/stenv/releases/download/2026.04.14/stenv-Linux-X64-py3.13-2026.04.14.yaml"
        type: string
      stenv_yaml_sha256:
        description: "Expected SHA256 for stenv release YAML"
        required: false
        default: "2f967290c3c9fe2a4b3911022a737d91cea72f52f0115ecacb4b1d355ad82cb8"
        type: string
      stenv_yaml_filename:
        description: "stenv release YAML filename"
        required: false
        default: "stenv-Linux-X64-py3.13-2026.04.14.yaml"
        type: string
      crds_context:
        description: "CRDS_CONTEXT"
        required: false
        default: "hst_1313.pmap"
        type: string

jobs:
  dq-direct-forensics:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install diagnostics tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gdb file binutils || true

      - name: Install micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          init-shell: bash
          cache-environment: false
          post-cleanup: all

      - name: Fetch stenv release YAML
        shell: bash
        run: |
          set -euo pipefail
          curl -L "${{ github.event.inputs.stenv_yaml_url }}" -o "${{ github.event.inputs.stenv_yaml_filename }}"
          echo "${{ github.event.inputs.stenv_yaml_sha256 }}  ${{ github.event.inputs.stenv_yaml_filename }}" | sha256sum -c -

      - name: Create official stenv environment
        shell: bash -l {0}
        run: |
          set -euo pipefail
          micromamba env create --name stenv-ti --file "${{ github.event.inputs.stenv_yaml_filename }}" --use-uv
          micromamba run -n stenv-ti python -V
          micromamba run -n stenv-ti bash -lc 'which calwf3.e || which calwf3'
          micromamba run -n stenv-ti bash -lc 'which crds || true'
          micromamba run -n stenv-ti python -c "import astropy, numpy, crds; print('astropy', astropy.__version__); print('numpy', numpy.__version__); print('crds', getattr(crds, '__version__', 'unknown'))"

      - name: Download true-science raw package
        shell: bash
        run: |
          set -euo pipefail
          curl -L "${{ github.event.inputs.raw_package_url }}" -o TI_PAPER_II_TRUE_SCIENCE_RAW_EXPOSURE_SET_REPLAY_PACKAGE_UPDATED.zip
          sha256sum TI_PAPER_II_TRUE_SCIENCE_RAW_EXPOSURE_SET_REPLAY_PACKAGE_UPDATED.zip | tee raw_package.sha256
          echo "${{ github.event.inputs.raw_package_sha256 }}  TI_PAPER_II_TRUE_SCIENCE_RAW_EXPOSURE_SET_REPLAY_PACKAGE_UPDATED.zip" | sha256sum -c -

      - name: Run calibrated replay inside stenv
        shell: bash -l {0}
        continue-on-error: true
        env:
          STENV_RELEASE: "2026.04.14"
          STENV_YAML_FILENAME: ${{ github.event.inputs.stenv_yaml_filename }}
          STENV_YAML_SHA256: ${{ github.event.inputs.stenv_yaml_sha256 }}
          CRDS_SERVER_URL: https://hst-crds.stsci.edu
          CRDS_PATH: ${{ github.workspace }}/crds_cache
          CRDS_CONTEXT: ${{ github.event.inputs.crds_context }}
          iref: ${{ github.workspace }}/crds_cache/references/hst/wfc3/
        run: |
          set +e
          micromamba run -n stenv-ti bash scripts/run_hstcal_replay.sh TI_PAPER_II_TRUE_SCIENCE_RAW_EXPOSURE_SET_REPLAY_PACKAGE_UPDATED.zip ti_hstcal_replay_work
          echo "$?" > replay_status.txt
          set -e
          cat replay_status.txt

      - name: Run compact DQ bitplane forensics inside stenv
        shell: bash -l {0}
        continue-on-error: true
        env:
          STENV_RELEASE: "2026.04.14"
          CRDS_CONTEXT: ${{ github.event.inputs.crds_context }}
        run: |
          set -euo pipefail
          mkdir -p ti_hstcal_dq_direct_work/results/logs

          micromamba run -n stenv-ti python - <<'PY' 2>&1 | tee ti_hstcal_dq_direct_work/results/logs/dq_direct_forensics_log.txt
          import csv
          import json
          import os
          import re
          from datetime import datetime, timezone

          import numpy as np
          from astropy.io import fits

          SCIENCE_EXTENSIONS = ["SCI", "ERR", "SAMP", "TIME"]
          ALL_EXTENSIONS = ["SCI", "ERR", "SAMP", "TIME", "DQ"]
          PACKAGE_DIR = "ti_hstcal_replay_work/results/normalized_package"
          GENERATED_DIR = "ti_hstcal_replay_work/results/generated"
          OUTPUT_DIR = "ti_hstcal_dq_direct_work/results"
          EXPECTED_ROOT_COUNT = 20

          def now_utc():
              return datetime.now(timezone.utc).isoformat()

          def mkdirp(path):
              os.makedirs(path, exist_ok=True)
              return path

          def write_json(path, obj):
              mkdirp(os.path.dirname(path))
              tmp = path + ".tmp"
              with open(tmp, "w", encoding="utf-8") as f:
                  json.dump(obj, f, indent=2, sort_keys=True)
              os.replace(tmp, path)

          def write_csv(path, rows, columns):
              mkdirp(os.path.dirname(path))
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=columns)
                  w.writeheader()
                  for row in rows:
                      w.writerow({k: row.get(k, "") for k in columns})

          def root_from_name(path):
              name = os.path.basename(path)
              m = re.match(r"(.+?)_(?:raw|flt|flc)\.fits(?:\.gz)?$", name, re.IGNORECASE)
              return m.group(1) if m else None

          def list_files(root, suffixes):
              out = []
              for dirpath, _, filenames in os.walk(root):
                  for fn in filenames:
                      low = fn.lower()
                      if any(low.endswith(s.lower()) for s in suffixes):
                          out.append(os.path.join(dirpath, fn))
              return sorted(out)

          def build_map(root):
              out = {}
              for p in list_files(root, ["_flt.fits", "_flc.fits"]):
                  r = root_from_name(p)
                  if r:
                      out[r] = p
              return out

          def get_ext_data(hdul, extname):
              for hdu in hdul:
                  name = str(hdu.header.get("EXTNAME", "")).upper().strip()
                  if name == extname and hdu.data is not None:
                      return hdu.data
              return None

          def exact_and_changed(gen_data, ref_data):
              if gen_data is None or ref_data is None:
                  return False, None, None, None
              if gen_data.shape != ref_data.shape:
                  return False, None, None, None

              if np.issubdtype(gen_data.dtype, np.floating) or np.issubdtype(ref_data.dtype, np.floating):
                  equal = (gen_data == ref_data) | (np.isnan(gen_data) & np.isnan(ref_data))
                  diff = np.abs(gen_data.astype(np.float64) - ref_data.astype(np.float64))
                  diff[np.isnan(diff)] = 0.0
              else:
                  equal = gen_data == ref_data
                  diff = np.abs(gen_data.astype(np.int64) - ref_data.astype(np.int64)).astype(np.float64)

              changed = ~equal
              changed_count = int(np.count_nonzero(changed))
              max_abs = float(np.max(diff)) if diff.size else None
              return changed_count == 0, changed_count, int(gen_data.size), max_abs

          def dq_stats(gen_dq, ref_dq):
              if gen_dq is None or ref_dq is None:
                  return None
              if gen_dq.shape != ref_dq.shape:
                  return None

              g = gen_dq.astype(np.uint64)
              r = ref_dq.astype(np.uint64)
              xor = np.bitwise_xor(g, r)
              mask = xor != 0
              mismatch_count = int(np.count_nonzero(mask))
              total = int(xor.size)

              if mismatch_count:
                  xor_values, xor_counts = np.unique(xor[mask], return_counts=True)
                  gen_values, gen_counts = np.unique(g[mask], return_counts=True)
                  ref_values, ref_counts = np.unique(r[mask], return_counts=True)
              else:
                  xor_values = np.array([], dtype=np.uint64)
                  xor_counts = np.array([], dtype=np.int64)
                  gen_values = np.array([], dtype=np.uint64)
                  gen_counts = np.array([], dtype=np.int64)
                  ref_values = np.array([], dtype=np.uint64)
                  ref_counts = np.array([], dtype=np.int64)

              xor_list = sorted([int(v) for v in xor_values.tolist()]) if mismatch_count else []
              bit_rows = []
              for bit in range(16):
                  bit_value = 1 << bit
                  bit_mask = (xor & np.uint64(bit_value)) != 0
                  c = int(np.count_nonzero(bit_mask))
                  if c:
                      bit_rows.append({
                          "bit_index": bit,
                          "bit_value": bit_value,
                          "changed_pixel_count": c,
                          "changed_pixel_fraction": float(c / total) if total else None,
                      })

              return {
                  "mask": mask,
                  "exact": mismatch_count == 0,
                  "mismatch_count": mismatch_count,
                  "total": total,
                  "fraction": float(mismatch_count / total) if total else None,
                  "xor_values": xor_list,
                  "xor_histogram": {str(int(v)): int(c) for v, c in zip(xor_values, xor_counts)},
                  "xor_only_4096": bool(mismatch_count > 0 and xor_list == [4096]),
                  "generated_values_on_mismatch": {str(int(v)): int(c) for v, c in zip(gen_values, gen_counts)},
                  "reference_values_on_mismatch": {str(int(v)): int(c) for v, c in zip(ref_values, ref_counts)},
                  "bit_rows": bit_rows,
              }

          mkdirp(OUTPUT_DIR)

          ref_map = build_map(os.path.join(PACKAGE_DIR, "data", "calibrated_reference"))
          gen_map = build_map(GENERATED_DIR)
          roots = sorted(set(ref_map.keys()) | set(gen_map.keys()))

          by_root = []
          by_bit = []
          overlap_rows = []
          failures = []
          extension_exact_counts = {ext: 0 for ext in ALL_EXTENSIONS}
          dq_exact_roots = []
          dq_mismatch_roots = []
          dq_xor_only_4096_roots = []
          dq_non_4096_roots = []
          roots_with_science_overlap = []

          roots_processed = 0

          for root in roots:
              ref_path = ref_map.get(root)
              gen_path = gen_map.get(root)

              if not ref_path or not gen_path:
                  failures.append({
                      "root": root,
                      "reason": "missing_reference_or_generated",
                      "reference_present": bool(ref_path),
                      "generated_present": bool(gen_path),
                  })
                  continue

              roots_processed += 1

              with fits.open(ref_path, memmap=False) as ref_hdul, fits.open(gen_path, memmap=False) as gen_hdul:
                  row = {"root": root, "reference_path": ref_path, "generated_path": gen_path}
                  science_diff_overlap = False

                  gen_dq = get_ext_data(gen_hdul, "DQ")
                  ref_dq = get_ext_data(ref_hdul, "DQ")
                  dqs = dq_stats(gen_dq, ref_dq)

                  dq_mask = dqs["mask"] if dqs else None

                  for ext in ALL_EXTENSIONS:
                      gen_data = get_ext_data(gen_hdul, ext)
                      ref_data = get_ext_data(ref_hdul, ext)
                      exact, changed_count, total, max_abs = exact_and_changed(gen_data, ref_data)

                      row[f"{ext}_exact"] = exact
                      row[f"{ext}_changed_pixel_count"] = changed_count
                      row[f"{ext}_total_pixel_count"] = total
                      row[f"{ext}_max_abs_diff"] = max_abs

                      if exact:
                          extension_exact_counts[ext] += 1

                      if ext in SCIENCE_EXTENSIONS:
                          if gen_data is not None and ref_data is not None and dq_mask is not None and gen_data.shape == ref_data.shape and gen_data.shape == dq_mask.shape:
                              if np.issubdtype(gen_data.dtype, np.floating) or np.issubdtype(ref_data.dtype, np.floating):
                                  equal = (gen_data == ref_data) | (np.isnan(gen_data) & np.isnan(ref_data))
                              else:
                                  equal = gen_data == ref_data
                              science_diff = ~equal
                              overlap = science_diff & dq_mask
                              overlap_count = int(np.count_nonzero(overlap))
                              science_diff_count = int(np.count_nonzero(science_diff))
                              dq_count = int(np.count_nonzero(dq_mask))
                              if overlap_count > 0:
                                  science_diff_overlap = True

                              overlap_rows.append({
                                  "root": root,
                                  "extension": ext,
                                  "science_exact": science_diff_count == 0,
                                  "dq_mismatch_pixels": dq_count,
                                  "science_diff_pixels_total": science_diff_count,
                                  "science_diff_pixels_overlap_dq_mismatch": overlap_count,
                                  "overlap_fraction_of_dq_mismatch": float(overlap_count / dq_count) if dq_count else 0.0,
                                  "overlap_fraction_of_science_diff": float(overlap_count / science_diff_count) if science_diff_count else 0.0,
                              })

                  if dqs:
                      row["DQ_mismatch_pixel_count"] = dqs["mismatch_count"]
                      row["DQ_total_pixel_count"] = dqs["total"]
                      row["DQ_mismatch_fraction"] = dqs["fraction"]
                      row["DQ_xor_values"] = json.dumps(dqs["xor_values"])
                      row["DQ_xor_histogram"] = json.dumps(dqs["xor_histogram"], sort_keys=True)
                      row["DQ_xor_only_4096"] = dqs["xor_only_4096"]
                      row["generated_DQ_values_on_mismatch"] = json.dumps(dqs["generated_values_on_mismatch"], sort_keys=True)
                      row["reference_DQ_values_on_mismatch"] = json.dumps(dqs["reference_values_on_mismatch"], sort_keys=True)

                      if dqs["exact"]:
                          dq_exact_roots.append(root)
                      else:
                          dq_mismatch_roots.append(root)

                      if dqs["xor_only_4096"]:
                          dq_xor_only_4096_roots.append(root)
                      elif not dqs["exact"]:
                          dq_non_4096_roots.append(root)

                      for br in dqs["bit_rows"]:
                          br = dict(br)
                          br["root"] = root
                          by_bit.append(br)

                  row["science_diff_overlap_DQ_mismatch"] = science_diff_overlap
                  if science_diff_overlap:
                      roots_with_science_overlap.append(root)

                  by_root.append(row)

          expected = EXPECTED_ROOT_COUNT
          science_exact = all(extension_exact_counts.get(ext) == expected for ext in SCIENCE_EXTENSIONS)
          dq_exact = extension_exact_counts.get("DQ") == expected
          all_4096 = len(dq_mismatch_roots) > 0 and sorted(dq_mismatch_roots) == sorted(dq_xor_only_4096_roots)
          no_overlap = len(roots_with_science_overlap) == 0

          strict_tier1b_exact_supported = science_exact and dq_exact and roots_processed == expected and len(failures) == 0
          strict_dq_provenance_acceptance_supported = (
              science_exact
              and not dq_exact
              and roots_processed == expected
              and len(failures) == 0
              and all_4096
              and no_overlap
          )

          if strict_tier1b_exact_supported:
              decision = "tier1b_exact_supported"
              decision_certificate = "dq_direct_forensics_strict_all_extension_exact_tier1b_supported"
              claim_ceiling = "Literal Tier 1B all-extension raw-to-calibrated FLT detector replay supported."
          elif strict_dq_provenance_acceptance_supported:
              decision = "tier1b_provenance_candidate_supported_not_literal_dq_exact"
              decision_certificate = "dq_direct_forensics_4096_only_no_science_overlap_tier1b_provenance_candidate_supported"
              claim_ceiling = "Strict DQ provenance candidate supported: SCI/ERR/SAMP/TIME exact 20/20; DQ mismatch confined to XOR=4096; no science-array overlap. Not literal DQ exact replay."
          elif science_exact:
              decision = "tier1a_preserved_tier1b_blocked"
              decision_certificate = "dq_direct_forensics_tier1a_preserved_tier1b_still_blocked"
              claim_ceiling = "Tier 1A science-array replay preserved; Tier 1B remains blocked by DQ evidence."
          else:
              decision = "science_array_regression_or_incomplete"
              decision_certificate = "dq_direct_forensics_science_array_regression_or_incomplete"
              claim_ceiling = "No Tier 1A/Tier 1B upgrade; science-array exactness failed or run incomplete."

          summary = {
              "timestamp_utc": now_utc(),
              "expected_root_count": expected,
              "roots_processed": roots_processed,
              "reference_root_count": len(ref_map),
              "generated_root_count": len(gen_map),
              "failure_count": len(failures),
              "failures": failures,
              "extension_exact_counts": extension_exact_counts,
              "science_exact_all_roots": science_exact,
              "dq_exact_all_roots": dq_exact,
              "dq_exact_roots": sorted(dq_exact_roots),
              "dq_mismatch_roots": sorted(dq_mismatch_roots),
              "dq_mismatch_count": len(dq_mismatch_roots),
              "dq_xor_only_4096_roots": sorted(dq_xor_only_4096_roots),
              "dq_non_4096_roots": sorted(dq_non_4096_roots),
              "all_dq_mismatch_roots_xor_only_4096": all_4096,
              "roots_with_science_overlap": sorted(roots_with_science_overlap),
              "no_science_overlap": no_overlap,
              "strict_tier1b_exact_supported": strict_tier1b_exact_supported,
              "strict_dq_provenance_acceptance_supported": strict_dq_provenance_acceptance_supported,
              "decision": decision,
              "decision_certificate": decision_certificate,
              "claim_ceiling": claim_ceiling,
              "forbidden_claims": [
                  "full public dark-matter closure from this run alone",
                  "raw-to-drizzled HLSP reconstruction",
                  "field acceptance",
                  "semantic evidence as closure evidence",
              ],
          }

          claim_decision = {
              "timestamp_utc": now_utc(),
              "decision": decision,
              "decision_certificate": decision_certificate,
              "claim_ceiling": claim_ceiling,
              "tier1a_science_array_replay_supported": science_exact,
              "tier1b_literal_all_extension_replay_supported": strict_tier1b_exact_supported,
              "dq_provenance_contract_candidate_supported": strict_dq_provenance_acceptance_supported,
              "extension_exact_counts": extension_exact_counts,
              "dq_mismatch_roots": sorted(dq_mismatch_roots),
              "dq_xor_only_4096_roots": sorted(dq_xor_only_4096_roots),
              "dq_non_4096_roots": sorted(dq_non_4096_roots),
              "roots_with_science_overlap": sorted(roots_with_science_overlap),
          }

          write_json(os.path.join(OUTPUT_DIR, "dq_bitplane_forensics_summary.json"), summary)
          write_json(os.path.join(OUTPUT_DIR, "claim_decision.json"), claim_decision)

          write_csv(
              os.path.join(OUTPUT_DIR, "dq_bitplane_forensics_by_root.csv"),
              by_root,
              [
                  "root",
                  "SCI_exact",
                  "ERR_exact",
                  "SAMP_exact",
                  "TIME_exact",
                  "DQ_exact",
                  "DQ_mismatch_pixel_count",
                  "DQ_total_pixel_count",
                  "DQ_mismatch_fraction",
                  "DQ_xor_values",
                  "DQ_xor_histogram",
                  "DQ_xor_only_4096",
                  "generated_DQ_values_on_mismatch",
                  "reference_DQ_values_on_mismatch",
                  "science_diff_overlap_DQ_mismatch",
                  "SCI_changed_pixel_count",
                  "ERR_changed_pixel_count",
                  "SAMP_changed_pixel_count",
                  "TIME_changed_pixel_count",
                  "DQ_changed_pixel_count",
                  "DQ_max_abs_diff",
                  "reference_path",
                  "generated_path",
              ],
          )

          write_csv(
              os.path.join(OUTPUT_DIR, "dq_bitplane_forensics_by_bit.csv"),
              by_bit,
              ["root", "bit_index", "bit_value", "changed_pixel_count", "changed_pixel_fraction"],
          )

          write_csv(
              os.path.join(OUTPUT_DIR, "science_overlap_audit.csv"),
              overlap_rows,
              [
                  "root",
                  "extension",
                  "science_exact",
                  "dq_mismatch_pixels",
                  "science_diff_pixels_total",
                  "science_diff_pixels_overlap_dq_mismatch",
                  "overlap_fraction_of_dq_mismatch",
                  "overlap_fraction_of_science_diff",
              ],
          )

          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

      - name: Upload compact direct DQ artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ti-paperii-hstcal-dq-direct-forensics-results
          path: |
            raw_package.sha256
            replay_status.txt
            ti_hstcal_replay_work/results/validation_report.json
            ti_hstcal_replay_work/results/logs/**
            ti_hstcal_replay_work/results/generated/**/winning_mode.txt
            ti_hstcal_replay_work/results/generated/**/winning_executable.txt
            ti_hstcal_replay_work/results/generated/**/winning_iref.txt
            ti_hstcal_dq_direct_work/results/dq_bitplane_forensics_summary.json
            ti_hstcal_dq_direct_work/results/dq_bitplane_forensics_by_root.csv
            ti_hstcal_dq_direct_work/results/dq_bitplane_forensics_by_bit.csv
            ti_hstcal_dq_direct_work/results/science_overlap_audit.csv
            ti_hstcal_dq_direct_work/results/claim_decision.json
            ti_hstcal_dq_direct_work/results/logs/**
          if-no-files-found: warn
