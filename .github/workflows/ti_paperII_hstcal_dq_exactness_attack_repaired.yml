name: TI Paper II HSTCAL DQ Literal Exactness Attack Repaired

on:
  workflow_dispatch:

jobs:
  dq_literal_exactness_attack:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip unzip curl
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install --break-system-packages numpy pandas astropy

      - name: Prepare directories
        run: |
          mkdir -p ti_hstcal_dq_exactness_work/results/logs
          mkdir -p ti_hstcal_dq_exactness_work/results/reports

      - name: Run all-in-one DQ exactness adjudicator
        run: |
          cat > dq_exactness_all_in_one.py <<'PY'
          import os, json, csv, zipfile
          from datetime import datetime, timezone

          OUT = "ti_hstcal_dq_exactness_work/results"
          os.makedirs(OUT, exist_ok=True)
          os.makedirs(os.path.join(OUT, "logs"), exist_ok=True)

          def now():
              return datetime.now(timezone.utc).isoformat()

          def write_json(name, obj):
              with open(os.path.join(OUT, name), "w") as f:
                  json.dump(obj, f, indent=2, sort_keys=True)

          def write_csv(name, rows, cols):
              with open(os.path.join(OUT, name), "w", newline="") as f:
                  w = csv.DictWriter(f, fieldnames=cols)
                  w.writeheader()
                  for r in rows:
                      w.writerow({c: r.get(c, "") for c in cols})

          # This all-in-one workflow is an instrumentation repair.
          # It does not pretend to prove DQ 20/20 unless generated/reference FITS
          # or full exactness outputs are present in the runner workspace.
          roots = []
          for base, dirs, files in os.walk("."):
              for fn in files:
                  if fn.endswith("_flt.fits") or fn.endswith("_flc.fits"):
                      roots.append(os.path.join(base, fn))

          summary = {
              "timestamp_utc": now(),
              "workflow": "all_in_one_repaired_dq_exactness",
              "instrumentation_repaired": True,
              "external_script_dependency_removed": True,
              "fits_products_seen": len(roots),
              "literal_dq_exact_20of20_supported": False,
              "decision": "instrumentation_repaired_but_no_generated_reference_fits_available_in_runner",
              "decision_certificate": "dq_all_in_one_instrumentation_repaired_no_fits_products_for_literal_dq20",
              "claim_ceiling": "This run repairs GitHub instrumentation and proves artifact emission works. It does not adjudicate literal DQ 20/20 unless generated/reference FITS products are present.",
              "required_next": "Run full HSTCAL replay workflow or modify this all-in-one workflow to download/produce generated/reference FLT/FLC products before DQ comparison."
          }

          decision = {
              "timestamp_utc": now(),
              "decision": summary["decision"],
              "decision_certificate": summary["decision_certificate"],
              "literal_dq_exact_20of20_supported": False,
              "science_exact_all_20": False,
              "dq_exact_count": None,
              "dq_mismatch_count": None
          }

          write_json("dq_exactness_attack_summary.json", summary)
          write_json("dq_exactness_attack_decision.json", decision)

          write_csv(
              "dq_exactness_by_root.csv",
              [],
              ["root","SCI_exact","ERR_exact","SAMP_exact","TIME_exact","DQ_exact","DQ_xor_only_4096","science_diff_overlap_DQ_mismatch"]
          )

          write_csv(
              "dq_exactness_by_bit.csv",
              [],
              ["root","bit_index","bit_value","changed_pixel_count","changed_pixel_fraction"]
          )

          write_csv(
              "dq_4096_direction_by_root.csv",
              [],
              ["root","ref_has_4096_gen_not_count","gen_has_4096_ref_not_count","direction"]
          )

          write_csv(
              "science_overlap_audit.csv",
              [],
              ["root","extension","science_exact","dq_mismatch_pixels","science_diff_pixels_total","science_diff_pixels_overlap_dq_mismatch"]
          )

          with open(os.path.join(OUT, "dq_exactness_attack_status.txt"), "w") as f:
              f.write("0\n")

          with open(os.path.join(OUT, "astrodrizzle_attempt_status.txt"), "w") as f:
              f.write("not_attempted\n")

          write_json("astrodrizzle_update_attempt_summary.json", {
              "timestamp_utc": now(),
              "attempted": False,
              "reason": "all_in_one_instrumentation_repair_only"
          })

          with open(os.path.join(OUT, "logs", "dq_exactness_all_in_one.log"), "w") as f:
              f.write(json.dumps(summary, indent=2, sort_keys=True))

          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

          python3 dq_exactness_all_in_one.py

      - name: Assert required outputs exist
        run: |
          test -s ti_hstcal_dq_exactness_work/results/dq_exactness_attack_summary.json
          test -s ti_hstcal_dq_exactness_work/results/dq_exactness_attack_decision.json
          test -s ti_hstcal_dq_exactness_work/results/dq_exactness_by_root.csv
          test -s ti_hstcal_dq_exactness_work/results/dq_exactness_by_bit.csv
          test -s ti_hstcal_dq_exactness_work/results/dq_4096_direction_by_root.csv
          test -s ti_hstcal_dq_exactness_work/results/science_overlap_audit.csv
          test -s ti_hstcal_dq_exactness_work/results/dq_exactness_attack_status.txt
          test -s ti_hstcal_dq_exactness_work/results/astrodrizzle_update_attempt_summary.json

      - name: Upload repaired artifact
        uses: actions/upload-artifact@v4
        with:
          name: ti-paperii-hstcal-dq-literal-exactness-attack-repaired-results
          path: ti_hstcal_dq_exactness_work/results
          if-no-files-found: error
